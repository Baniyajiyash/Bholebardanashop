<style>
  :root{--jute:#b98247;--jute-dark:#8a5f31;--sack:#e7cfa1;--sack-light:#f6ecd9;--ink:#2c2013;--ink-soft:#5a4630;--green:#4c6b3f;--whatsapp:#25D366;--terracotta-red:#a83c2b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Segoe UI',sans-serif;background:var(--sack-light);color:var(--ink);}
  a{text-decoration:none;color:inherit;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1140px;margin:0 auto;padding:0 24px;}
  .fab-group{position:fixed;right:22px;bottom:22px;z-index:80;display:flex;flex-direction:column;gap:14px;}
  .fab{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;box-shadow:0 10px 26px rgba(0,0,0,0.3);}
  .fab-call{background:var(--green);} .fab-whatsapp{background:var(--whatsapp);}
  header{position:sticky;top:0;background:rgba(246,236,217,0.95);border-bottom:3px solid var(--jute);padding:16px 24px;}
  .brand{display:flex;gap:12px;align-items:center;} .brand .mark{width:42px;height:42px;border-radius:50%;background:var(--jute);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;}
  .hero{padding:90px 24px;text-align:center;}
  .btn{padding:14px 28px;border-radius:3px;font-weight:700;border:2px solid var(--ink);display:inline-block;margin:5px;}
  .btn-solid{background:var(--terracotta-red);color:#fff;}
  .gallery{background:var(--sack);padding:80px 24px;}
  .gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .gallery-grid figure{border-radius:6px;overflow:hidden;}
  .contact{background:var(--jute);color:#fff;padding:80px 24px;text-align:center;}
  .contact-pill{background:rgba(255,255,255,0.12);padding:14px 24px;border-radius:100px;display:inline-block;margin:8px;}
  footer{background:var(--ink);color:#a9977a;padding:30px;text-align:center;}
  @media (max-width:820px){.gallery-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
