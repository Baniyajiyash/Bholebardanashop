 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhole Bardana Shop — Farrukhabad</title>
<style>
  :root{
    --jute:#b98247;
    --jute-dark:#8a5f31;
    --sack:#e7cfa1;
    --sack-light:#f6ecd9;
    --ink:#2c2013;
    --ink-soft:#5a4630;
    --green:#4c6b3f;
    --terracotta-red:#a83c2b;
    --thread:#c94f4f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--sack-light);
    color:var(--ink);
    overflow-x:hidden;
  }
  h1,h2,h3,.display{
    font-family:Georgia,'Times New Roman',serif;
    font-weight:700;
    letter-spacing:0.01em;
  }
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1140px;margin:0 auto;padding:0 24px;}

  .weave{
    height:14px;
    background:repeating-linear-gradient(45deg,var(--jute) 0 6px, var(--jute-dark) 6px 12px);
  }

  header{
    position:sticky;top:0;z-index:50;
    background:rgba(246,236,217,0.92);
    backdrop-filter:blur(6px);
    border-bottom:3px solid var(--jute);
  }
  nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:1140px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{
    width:42px;height:42px;border-radius:50%;
    background:var(--jute);display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:20px;font-weight:900;font-family:Georgia,serif;
    box-shadow:0 0 0 3px var(--sack);
  }
  .brand .names{line-height:1.15;}
  .brand .names .en{font-size:19px;font-weight:800;}
  .brand .names .hi{font-size:13px;color:var(--ink-soft);}
  nav ul{display:flex;gap:28px;list-style:none;}
  nav ul a{font-size:14px;font-weight:600;color:var(--ink-soft);position:relative;padding-bottom:3px;}
  nav ul a::after{
    content:'';position:absolute;left:0;bottom:0;width:0;height:2px;background:var(--thread);
    transition:width .25s ease;
  }
  nav ul a:hover::after{width:100%;}
  .nav-toggle{display:none;background:none;border:none;font-size:26px;cursor:pointer;color:var(--ink);}

  .hero{
    position:relative;
    padding:90px 24px 70px;
    text-align:center;
    overflow:hidden;
    background:
      radial-gradient(ellipse at 20% -10%, rgba(185,130,71,0.25), transparent 55%),
      radial-gradient(ellipse at 85% 0%, rgba(76,107,63,0.18), transparent 50%),
      var(--sack-light);
  }
  .hero .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12.5px;letter-spacing:0.18em;text-transform:uppercase;
    color:var(--jute-dark);font-weight:700;margin-bottom:18px;
    opacity:0;animation:riseIn .7s ease forwards;
  }
  .hero .eyebrow::before,.hero .eyebrow::after{content:'';width:26px;height:1px;background:var(--jute-dark);}
  .hero h1{
    font-size:clamp(38px,6vw,68px);
    line-height:1.05;color:var(--ink);
    opacity:0;animation:riseIn .8s ease .12s forwards;
  }
  .hero h1 span{color:var(--terracotta-red);font-style:italic;}
  .hero p.lede{
    max-width:560px;margin:20px auto 0;
    font-size:17px;color:var(--ink-soft);line-height:1.6;
    opacity:0;animation:riseIn .8s ease .24s forwards;
  }
  .hero .cta-row{
    display:flex;gap:14px;justify-content:center;margin-top:32px;flex-wrap:wrap;
    opacity:0;animation:riseIn .8s ease .36s forwards;
  }
  .btn{
    padding:14px 28px;border-radius:3px;font-weight:700;font-size:14.5px;
    letter-spacing:0.02em;cursor:pointer;border:2px solid var(--ink);
    transition:transform .18s ease, box-shadow .18s ease;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn-solid{background:var(--terracotta-red);border-color:var(--terracotta-red);color:#fff;}
  .btn-solid:hover{transform:translateY(-3px);box-shadow:0 10px 20px rgba(168,60,43,0.3);}
  .btn-outline{background:transparent;color:var(--ink);}
  .btn-outline:hover{transform:translateY(-3px);background:var(--ink);color:var(--sack-light);}

    margin-top:26px;font-size:13
