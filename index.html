<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhole Bardana Shop — Farrukhabad</title>
<style>
  :root{
    --jute:#b98247; --jute-dark:#8a5f31; --sack:#e7cfa1; --sack-light:#f6ecd9;
    --ink:#2c2013; --ink-soft:#5a4630; --green:#4c6b3f; --whatsapp:#25D366; --terracotta-red:#a83c2b; --thread:#c94f4f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--sack-light);color:var(--ink);overflow-x:hidden;}
  h1,h2,h3{font-family:Georgia,'Times New Roman',serif;font-weight:700;} 
  a{color:inherit;text-decoration:none;} 
  img{max-width:100%;display:block;} 
  .wrap{max-width:1140px;margin:0 auto;padding:0 24px;}
  .weave{height:14px;background:repeating-linear-gradient(45deg,var(--jute) 0 6px, var(--jute-dark) 6px 12px);}

  /* ---------- FLOATING BUTTONS FIXED ---------- */
  .fab-group{position:fixed;right:22px;bottom:22px;z-index:80;display:flex;flex-direction:column;gap:14px;}
  .fab{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;box-shadow:0 10px 26px rgba(0,0,0,0.3);animation:fabPulse 2.2s ease-in-out infinite;cursor:pointer;}
  .fab-call{background:var(--green);} .fab-whatsapp{background:var(--whatsapp);}
  .fab:nth-child(2){animation-delay:.3s;}
  @keyframes fabPulse{0%,100%{box-shadow:0 10px 26px rgba(76,107,63,0.45);}50%{box-shadow:0 10px 26px rgba(76,107,63,0.45), 0 0 0 10px rgba(76,107,63,0.12);}}
  .fab .ring{width:9px;height:9px;border-radius:50%;background:#c9ffb0;position:absolute;margin-top:-30px;animation:pulse 1.4s infinite;}

  header{position:sticky;top:0;z-index:50;background:rgba(246,236,217,0.92);backdrop-filter:blur(6px);border-bottom:3px solid var(--jute);}
  nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:1140px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{width:42px;height:42px;border-radius:50%;background:var(--jute);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:900;box-shadow:0 0 0 3px var(--sack);}
  .brand .names .en{font-size:19px;font-weight:800;} .brand .names .hi{font-size:13px;color:var(--ink-soft);}
  nav ul{display:flex;
