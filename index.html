<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhole Bardana Shop — Farrukhabad</title>
<style>
  :root{
    --jute:#b98247;
    --jute-dark:#8a5f31;
    --sack:#e7cfa1;
    --sack-light:#f6ecd9;
    --ink:#2c2013;
    --ink-soft:#5a4630;
    --green:#4c6b3f;
    --terracotta-red:#a83c2b;
    --thread:#c94f4f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--sack-light);
    color:var(--ink);
    overflow-x:hidden;
  }
  h1,h2,h3,.display{
    font-family:Georgia,'Times New Roman',serif;
    font-weight:700;
    letter-spacing:0.01em;
  }
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1140px;margin:0 auto;padding:0 24px;}
  .weave{height:14px;background:repeating-linear-gradient(45deg,var(--jute) 0 6px, var(--jute-dark) 6px 12px);}
  header{position:sticky;top:0;z-index:50;background:rgba(246,236,217,0.92);backdrop-filter:blur(6px);border-bottom:3px solid var(--jute);}
  nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:1140px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{width:42px;height:42px;border-radius:50%;background:var(--jute);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:900;font-family:Georgia,serif;box-shadow:0 0 0 3px var(--sack);}
  .brand .names{line-height:1.15;}
  .brand .names .en{font-size:19px;font-weight:800;}
  .brand .names .hi{font-size:13px;color:var(--ink-soft);}
  nav ul{display:flex;gap:28px;list-style:none;}
  nav ul a{font-size:14px;font-weight:600;color:var(--ink-soft);position:relative;padding-bottom:3px;}
  nav ul a::after{content:'';position:absolute;left:0;bottom:0;width:0;height:2px;background:var(--thread);transition:width .25s ease;}
  nav ul a:hover::after{width:100%;}
  .nav-toggle{display:none;background:none;border:none;font-size:26px;cursor:pointer;color:var(--ink);}
  .hero{position:relative;padding:90px 24px 70px;text-align:center;overflow:hidden;background:radial-gradient(ellipse at 20% -10%, rgba(185,130,71,0.25), transparent 55%),radial-gradient(ellipse at 85% 0%, rgba(76,107,63,0.18), transparent 50%),var(--sack-light);}
  .hero .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--jute-dark);font-weight:700;margin-bottom:18px;opacity:0;animation:riseIn .7s ease forwards;}
  .hero .eyebrow::before,.hero .eyebrow::after{content:'';width:26px;height:1px;background:var(--jute-dark);}
  .hero h1{font-size:clamp(38px,6vw,68px);line-height:1.05;color:var(--ink);opacity:0;animation:riseIn .8s ease .12s forwards;}
  .hero h1 span{color:var(--terracotta-red);font-style:italic;}
  .hero p.lede{max-width:560px;margin:20px auto 0;font-size:17px;color:var(--ink-soft);line-height:1.6;opacity:0;animation:riseIn .8s ease .24s forwards;}
  .hero .cta-row{display:flex;gap:14px;justify-content:center;margin-top:32px;flex-wrap:wrap;opacity:0;animation:riseIn .8s ease .36s forwards;}
  .btn{padding:14px 28px;border-radius:3px;font-weight:700;font-size:14.5px;letter-spacing:0.02em;cursor:pointer;border:2px solid var(--ink);transition:transform .18s ease, box-shadow .18s ease;display:inline-flex;align-items:center;gap:8px;}
  .btn-solid{background:var(--terracotta-red);border-color:var(--terracotta-red);color:#fff;}
  .btn-solid:hover{transform:translateY(-3px);box-shadow:0 10px 20px rgba(168,60,43,0.3);}
  .btn-outline{background:transparent;color:var(--ink);}
  .btn-outline:hover{transform:translateY(-3px);background:var(--ink);color:var(--sack-light);}
  .hero .status{margin-top:26px;font-size:13px;color:var(--green);font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;opacity:0;animation:riseIn .8s ease .48s forwards;}
  .hero .status .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.8s infinite;}
  @keyframes riseIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(76,107,63,0.5);}70%{opacity:0.6;box-shadow:0 0 0 6px rgba(76,107,63,0);}}
  .tagline-strip{display:flex;justify-content:center;gap:38px;margin-top:56px;flex-wrap:wrap;}
  .hang-tag{display:flex;flex-direction:column;align-items:center;opacity:0;animation:swingIn .8s ease forwards;}
  .hang-tag:nth-child(1){animation-delay:.55s;}
  .hang-tag:nth-child(2){animation-delay:.68s;}
  .hang-tag:nth-child(3){animation-delay:.81s;}
  .hang-tag:nth-child(4){animation-delay:.94s;}
  .hang-tag .string{width:1px;height:22px;background:var(--ink-soft);}
  .hang-tag .card{background:var(--sack);border:1.5px solid var(--jute-dark);border-radius:5px;padding:10px 16px;font-size:13px;font-weight:700;color:var(--ink);box-shadow:2px 3px 0 rgba(0,0,0,0.08);transform-origin:top center;animation:sway 3.4s ease-in-out infinite;}
  .hang-tag:nth-child(2n) .card{animation-delay:.4s;}
  @keyframes swingIn{from{opacity:0;transform:translateY(-14px) rotate(-8deg);}to{opacity:1;transform:translateY(0) rotate(0);}}
  @keyframes sway{0%,100%{transform:rotate(-2.5deg);}50%{transform:rotate(2.5deg);}}
  .reveal{opacity:0;transform:translateY(28px);transition:opacity .7s ease, transform .7s ease;}
  .reveal.visible{opacity:1;transform:translateY(0);}
  section{padding:80px 24px;}
  .section-head{max-width:640px;margin:0 auto 46px;text-align:center;}
  .section-head .eyebrow{font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--jute-dark);font-weight:700;}
  .section-head h2{font-size:clamp(28px,4vw,40px);margin-top:10px;}
  .section-head p{margin-top:12px;color:var(--ink-soft);font-size:15.5px;line-height:1.6;}
  .gallery{background:var(--sack);}
  .gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .gallery-grid figure{position:relative;border-radius:6px;overflow:hidden;aspect-ratio:3/4;border:1px solid rgba(0,0,0,0.08);}
  .gallery-grid figure:first-child{grid-column:span 2;grid-row:span 2;aspect-ratio:auto;}
  .gallery-grid img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;}
  .gallery-grid figure:hover img{transform:scale(1.06);}
  .gallery-grid figcaption{position:absolute;left:0;right:0;bottom:0;padding:14px;background:linear-gradient(to top, rgba(20,14,6,0.75), transparent);color:#fff;font-size:13px;font-weight:600;opacity:0;transform:translateY(8px);transition:all .3s ease;}
  .gallery-grid figure:hover figcaption{opacity:1;transform:translateY(0);}
  .stock-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:22px;}
  .stock-card{background:var(--sack-light);border:1px solid rgba(138,95,49,0.25);border-radius:8px;padding:26px 22px;transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;}
  .stock-card:hover{transform:translateY(-6px);box-shadow:0 16px 30px rgba(44,32,19,0.1);border-color:var(--jute);}
  .stock-card .ic{width:46px;height:46px;border-radius:50%;background:var(--jute);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:16px;}
  .stock-card h3{font-size:17px;margin-bottom:8px;}
  .stock-card p{font-size:14px;color:var(--ink-soft);line-height:1.55;}
  .about{background:var(--ink);color:var(--sack-light);}
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;}
  .about h2{color:#fff;font-size:clamp(26px,4vw,36px);margin-bottom:18px;}
  .about p{color:#cbb99a;font-size:15.5px;line-height:1.75;margin-bottom:14px;}
